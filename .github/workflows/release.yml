name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build draft release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run core checks
        run: swift run ClackCoreChecks

      - name: Build app bundle
        run: ./scripts/build_app.sh

      - name: Archive app
        run: |
          set -euo pipefail

          cd .build/apple
          ditto -c -k --keepParent Clack.app Clack.zip
          shasum -a 256 Clack.zip > Clack.zip.sha256

      - name: Write release notes
        run: |
          set -euo pipefail

          cat > .build/apple/release-notes.md <<'EOF'
          Draft release for Clack.

          This build is unsigned. Review, sign, notarize, and replace the artifact before publishing a public release.
          EOF

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            .build/apple/Clack.zip \
            .build/apple/Clack.zip.sha256 \
            --draft \
            --title "Clack $GITHUB_REF_NAME" \
            --notes-file .build/apple/release-notes.md
