name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build prerelease
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare release metadata
        run: |
          set -euo pipefail

          build_date="$(date -u +%Y-%m-%d)"
          version="${GITHUB_REF_NAME#v}"
          asset_name="Clack-${version}-${build_date}"

          echo "BUILD_DATE=$build_date" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$asset_name" >> "$GITHUB_ENV"

      - name: Run core checks
        run: swift run ClackCoreChecks

      - name: Build app bundle
        run: ./scripts/build_app.sh

      - name: Archive app
        run: |
          set -euo pipefail

          cd .build/apple
          ditto -c -k --keepParent Clack.app "${ASSET_NAME}.zip"
          shasum -a 256 "${ASSET_NAME}.zip" > "${ASSET_NAME}.zip.sha256"

      - name: Write release notes
        run: |
          set -euo pipefail

          cat > .build/apple/release-notes.md <<EOF
          Preliminary alpha build.

          Build date: ${BUILD_DATE}
          Commit: ${GITHUB_SHA}

          This build is unsigned and not notarized. macOS may warn before opening it.
          EOF

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            ".build/apple/${ASSET_NAME}.zip" \
            ".build/apple/${ASSET_NAME}.zip.sha256" \
            --prerelease \
            --latest=false \
            --title "Clack ${GITHUB_REF_NAME} (${BUILD_DATE})" \
            --notes-file .build/apple/release-notes.md
