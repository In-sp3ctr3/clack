name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - "type: feature"
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or pain point should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Clack to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there other ways to solve this?
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy impact
      options:
        - label: This feature may affect how clipboard data is stored, displayed, transmitted, or deleted.
          required: false
